<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste OSPF C-to-HTML</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
        .router { 
            background: #444; border: 2px solid #00ff00; 
            padding: 10px; margin: 10px; border-radius: 8px; display: inline-block;
        }
        .path { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Monitor de Roteamento OSPF</h1>
    <div id="rede">Carregando dados do C...</div>

    <script>
        async function atualizar() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const container = document.getElementById('rede');
                container.innerHTML = "";

                data.nos.forEach(no => {
                    const div = document.createElement('div');
                    div.className = 'router';
                    const nome = String.fromCharCode(65 + no.id); // 0=A, 1=B...
                    const paiNome = no.pai !== -1 ? String.fromCharCode(65 + no.pai) : "Nenhum";
                    
                    div.innerHTML = `
                        <strong>Roteador ${nome}</strong><br>
                        Distância: ${no.dist}<br>
                        Vindo de: <span class="path">${paiNome}</span>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                console.log("Aguardando arquivo data.json...");
            }
        }

        // Atualiza a cada 2 segundos para "sentir" o C mudando os dados
        setInterval(atualizar, 2000);        // Atualiza a cada 2 segundos para "sentir" o C mudando os dados

        atualizar();
    </script>
</body>
</html>
